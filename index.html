<!DOCTYPE html>
<html>

<head>
    <title>Page Title</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h1>User Registration</h1>

    <form>
        <div>
            <label for="title">Title:</label>
            <select id="title">
                <option value="mr">Mr.</option>
                <option value="mrs">Mrs.</option>
                <option value="ms">Ms.</option>
                <option value="phd">Dr.</option>
            </select>
        </div>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" placeholder="John">
        <br>
        <label for="lname">Last Name:</label>
        <input type="text" id="lname" placeholder="Doe">
        <br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob">
        <br>
        <label for="email">Email Address:</label>
        <input type="email" id="email" placeholder="JohnDoe@gmail.com">
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password">
        <br>
        <label for="password2">Confirm Password:</label>
        <input type="password" id="password2" placeholder="Confirm your password">
        <br>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" placeholder="+64-123-4567">
        <br>
        <label for="city">City:</label>
        <input type="text" id="city" placeholder="Enter your city">
        <br>
        <div class="terms">
            <input style="display: inline-block;" type="checkbox" id="terms">
            <label for="terms">I agree to the terms and conditions.</label>
        </div>
        <br>
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>
    </form>
</body>

</html>
